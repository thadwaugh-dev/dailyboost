<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyBoost — Daily Content Ideas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
 
    [data-theme="dark"] {
      --bg: #0a0a0f;
      --bg-elevated: #12121a;
      --bg-card: #16161f;
      --bg-input: #1a1a26;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      --text: #f0f0f5;
      --text-muted: #8b8b9e;
      --text-faint: #5c5c6e;
      --accent: #7c5cff;
      --accent-hover: #9278ff;
      --accent-glow: rgba(124, 92, 255, 0.35);
      --accent-soft: rgba(124, 92, 255, 0.12);
      --success: #34d399;
      --success-soft: rgba(52, 211, 153, 0.12);
      --warning: #fbbf24;
      --pro-gradient: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
      --overlay: rgba(0, 0, 0, 0.65);
    }

    [data-theme="light"] {
      --bg: #f5f5fa;
      --bg-elevated: #ffffff;
      --bg-card: #ffffff;
      --bg-input: #f0f0f6;
      --border: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.16);
      --text: #1a1a2e;
      --text-muted: #5c5c6e;
      --text-faint: #8b8b9e;
      --accent: #6d4aff;
      --accent-hover: #5a38e0;
      --accent-glow: rgba(109, 74, 255, 0.25);
      --accent-soft: rgba(109, 74, 255, 0.08);
      --success: #059669;
      --success-soft: rgba(5, 150, 105, 0.1);
      --warning: #d97706;
      --pro-gradient: linear-gradient(135deg, #f59e0b, #ef4444, #ec4899);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.06);
      --overlay: rgba(0, 0, 0, 0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-glow), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(236, 72, 153, 0.08), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 24px 20px 64px; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--pro-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: var(--shadow-sm);
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .logo p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: -2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-icon {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 50%;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-pro {
      background: var(--pro-gradient);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 10px 20px;
    }

    .btn-pro:hover { box-shadow: 0 4px 24px rgba(245, 158, 11, 0.35); }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-muted);
    }

    .btn-ghost:hover { color: var(--text); background: var(--accent-soft); }

    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    /* Hero / Input */
    .hero { text-align: center; margin-bottom: 40px; }

    .hero h2 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .hero h2 span {
      background: var(--pro-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1.05rem;
      max-width: 520px;
      margin: 0 auto 32px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 640px;
      margin: 0 auto;
    }

    .topic-input {
      width: 100%;
      padding: 20px 24px;
      font-size: 1.1rem;
      font-family: inherit;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      resize: vertical;
      min-height: 64px;
    }

    .topic-input::placeholder { color: var(--text-faint); }

    .topic-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .generate-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-generate {
      padding: 16px 40px;
      font-size: 1.05rem;
      border-radius: var(--radius);
      min-width: 200px;
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-generate.loading .btn-text { opacity: 0; }
    .btn-generate .spinner {
      display: none;
      position: absolute;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-generate.loading .spinner { display: block; }
    .btn-generate { position: relative; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .results { display: none; animation: fadeUp 0.5s ease; }
    .results.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .results-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .results-toolbar .topic-label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .results-toolbar .topic-label strong { color: var(--text); }

    .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .section {
      margin-bottom: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .section-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--accent-soft);
      color: var(--accent);
    }

    .section-body { padding: 8px 0; }

    .content-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    .content-item:last-child { border-bottom: none; }
    .content-item:hover { background: var(--accent-soft); }

    .item-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .content-item:hover .item-actions { opacity: 1; }

    .item-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-input);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      color: var(--text-muted);
    }

    .item-btn:hover { background: var(--accent); color: #fff; }
    .item-btn.favorited { color: #f59e0b; opacity: 1; }

    .hashtag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 20px;
    }

    .hashtag {
      padding: 8px 14px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
    }

    .hashtag:hover {
      background: var(--accent);
      color: #fff;
      transform: scale(1.04);
    }

    .thread-item .item-text { font-style: normal; }
    .thread-item .thread-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
    }
    .thread-item .thread-preview {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .hook-item .item-text {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 1rem;
    }

    /* Favorites panel */
    .favorites-panel {
      margin-top: 32px;
      display: none;
    }

    .favorites-panel.visible { display: block; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 14px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      font-size: 0.875rem;
      animation: toastIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success { border-color: var(--success); }
    .toast.success::before { content: "✓"; color: var(--success); font-weight: 700; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 900;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow);
      animation: fadeUp 0.3s ease;
      text-align: center;
    }

    .modal .pro-badge {
      display: inline-block;
      padding: 6px 16px;
      background: var(--pro-gradient);
      color: #fff;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .modal h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .modal p {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .pro-features {
      text-align: left;
      list-style: none;
      margin-bottom: 28px;
    }

    .pro-features li {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pro-features li::before {
      content: "✦";
      color: #f59e0b;
      font-size: 0.75rem;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-actions .btn { flex: 1; }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-faint);
      font-size: 0.8rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .app { padding: 16px 16px 48px; }
      header { margin-bottom: 32px; }
      .header-actions .btn-pro span.label { display: none; }
      .results-toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-actions { justify-content: stretch; }
      .toolbar-actions .btn { flex: 1; }
      .item-actions { opacity: 1; }
      .content-item { padding: 12px 16px; }
      .toast-container { left: 16px; right: 16px; bottom: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>DailyBoost</h1>
    <p class="tagline">Fresh content ideas for your niche — every day, in seconds</p>

    <div class="controls">
      <select id="niche">
        <option value="">Select a niche...</option>
        <option value="Marketing">Marketing & Social Media</option>
        <option value="Productivity">Productivity & Habits</option>
        <option value="Fitness">Fitness & Health</option>
        <option value="Parenting">Parenting</option>
        <option value="Finance">Personal Finance</option>
        <option value="Business">Small Business</option>
        <option value="Cooking">Cooking & Recipes</option>
      </select>
      <input type="text" id="custom" placeholder="Or type your own niche...">
      <br><br>
      <button onclick="generateDailyBoost()">Generate Today's Boost</button>
    </div>

    <div class="pro-cta">
      <p><strong>Ready for unlimited daily boosts + more features?</strong></p>
      <a href="https://thadventure8.gumroad.com/l/dailyboost-pro" target="_blank">Get DailyBoost Pro →</a>
      <p style="margin-top: 16px;">Got a good idea? Expand it with <a href="https://thadwaugh-dev.github.io/content-spark-simple/" target="_blank" style="color: var(--accent);">ContentSpark</a></p>
    </div>

    <div id="results" class="results">
      <h2 id="nicheTitle"></h2>
      <button class="copy-btn copy-all" onclick="copyAll()">Copy All Ideas</button>
      <div id="ideas"></div>
    </div>

    <div id="favoritesPanel" class="favorites-panel" style="display: none;">
      <h2>Saved Favorites</h2>
      <button onclick="clearFavorites()">Clear All Favorites</button>
      <div id="favoritesList"></div>
    </div>
  </div>

  <script>
    let favorites = JSON.parse(localStorage.getItem('dailyboost-favorites') || '[]');

    function saveFavorites() {
      localStorage.setItem('dailyboost-favorites', JSON.stringify(favorites));
      renderFavorites();
    }

    function generateDailyBoost() {
      let niche = document.getElementById('niche').value;
      if (!niche) niche = document.getElementById('custom').value || "Your Niche";

      const container = document.getElementById('ideas');
      container.innerHTML = '';

      const sampleIdeas = [
        `Strong hook for ${niche}: "The one thing most people get wrong about..."`,
        `Quick tip: The 5-minute ${niche} habit that actually compounds...`,
        `Thread idea: "I changed one thing in ${niche} this week and the results surprised me..."`,
        `Value post idea: Before vs After transformation in ${niche}`,
        `Engagement question: What's your biggest challenge with ${niche} right now?`,
        `Hot take for ${niche}: "You don't need more tools — you need this mindset shift..."`,
        `Weekend reminder for ${niche} people: Rest is part of the strategy...`
      ];

      sampleIdeas.forEach((idea) => {
        const div = document.createElement('div');
        div.className = 'idea';
        div.innerHTML = `
          <p>${idea}</p>
          <button class="copy-btn" onclick="copyToClipboard(this)">Copy</button>
          <button class="fav-btn" onclick="toggleFavorite(this, '${niche}', '${idea.replace(/'/g, "\\'")}')">☆</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('nicheTitle').textContent = `Today's ${niche} Boost`;
      document.getElementById('results').classList.add('visible');
      document.getElementById('favoritesPanel').style.display = 'block';
    }

    function copyToClipboard(btn) {
      const text = btn.parentElement.querySelector('p').textContent;
      navigator.clipboard.writeText(text);
      const original = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = original, 1800);
    }

    function toggleFavorite(btn, niche, text) {
      const index = favorites.findIndex(f => f.text === text);
      if (index > -1) {
        favorites.splice(index, 1);
        btn.textContent = '☆';
      } else {
        favorites.push({niche, text, savedAt: Date.now()});
        btn.textContent = '★';
      }
      saveFavorites();
    }

    function renderFavorites() {
      const list = document.getElementById('favoritesList');
      if (favorites.length === 0) {
        list.innerHTML = '<p>No favorites yet. Star any idea to save it here.</p>';
        return;
      }
      list.innerHTML = favorites.map(f => `
        <div class="idea">
          <p><strong>${f.niche}</strong><br>${f.text}</p>
        </div>
      `).join('');
    }

    function copyAll() {
      const ideas = Array.from(document.querySelectorAll('.idea p')).map(p => p.textContent).join('\n\n---\n\n');
      navigator.clipboard.writeText(ideas);
      alert('All ideas copied!');
    }

    function clearFavorites() {
      if (confirm('Clear all favorites?')) {
        favorites = [];
        saveFavorites();
      }
    }

    renderFavorites();
  </script>
</body>
</html>
